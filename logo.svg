<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b44fff"/>
      <stop offset="100%" stop-color="#5500cc"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="128" cy="128" r="128" fill="url(#bg)"/>
  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="116" fill="none" stroke="#b44fff" stroke-width="1.5" opacity="0.25"/>
  <!-- Ghost/mask shape -->
  <g filter="url(#blur)">
    <!-- Head -->
    <path d="M88,148 Q88,88 128,84 Q168,88 168,148 L168,172 Q155,164 148,172 Q141,180 128,172 Q115,180 108,172 Q101,164 88,172 Z"
          fill="url(#glow)" opacity="0.92"/>
    <!-- Eyes — empty hollow sockets -->
    <ellipse cx="112" cy="130" rx="10" ry="12" fill="#050508"/>
    <ellipse cx="144" cy="130" rx="10" ry="12" fill="#050508"/>
    <!-- Eye glow -->
    <ellipse cx="112" cy="130" rx="5" ry="6" fill="#cc88ff" opacity="0.8"/>
    <ellipse cx="144" cy="130" rx="5" ry="6" fill="#cc88ff" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="128" y="226" font-family="Arial Black, sans-serif" font-size="20" font-weight="900"
        fill="#cc88ff" text-anchor="middle" letter-spacing="4" opacity="0.95">PUREFY</text>
</svg>
